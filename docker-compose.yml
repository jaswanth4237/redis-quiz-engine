version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: quiz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz-api
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - API_PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
